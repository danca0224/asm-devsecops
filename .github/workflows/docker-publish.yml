          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build worker-report image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/worker-report:latest ./servicios/worker-report

      - name: Push worker-report image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/worker-report:latest

  build-and-push-worker-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build worker-scanner image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/worker-scanner:latest ./servicios/worker-scanner

      - name: Push worker-scanner image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/worker-scanner:latest
